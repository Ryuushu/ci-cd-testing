name: Deploy via NetBird

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest  # penting jika runner di NetBird

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install NetBird
        run: |
          curl -fsSL https://pkgs.netbird.io/install.sh | sudo bash
          sudo netbird up --setup-key ${{ secrets.NETBIRD_KEY }}
      - name: ping
        run: |
          ping -c 10 100.84.54.5
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 100.84.54.5 >> ~/.ssh/known_hosts
      - name: SSH Deploy
        run: |
          ssh root@100.84.54.5
