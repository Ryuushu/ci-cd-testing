name: Deploy via Cloudflare Tunnel SSH

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Install dependency
      # =========================
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client wget

      # =========================
      # 2. Install cloudflared
      # =========================
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      # =========================
      # 3. Setup SSH config (IMPORTANT)
      # =========================
      - name: Setup SSH config
        run: |
          mkdir -p ~/.ssh

          cat <<EOF > ~/.ssh/config
          Host nixie
            HostName ssh.nixie.my.id
            User root
            ProxyCommand cloudflared access tcp --hostname %h
          EOF

          chmod 600 ~/.ssh/config

      # =========================
      # 4. Test connection
      # =========================
      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no nixie "whoami && hostname"

      # =========================
      # 5. Deploy step (CUSTOMIZE HERE)
      # =========================
      - name: Deploy application
        run: |
          ssh nixie "
            set -e

            echo '===== DEPLOY START ====='

            cd /home/nixie || exit 1

            git pull origin main

            docker compose down || true
            docker compose up -d --build

            echo '===== DEPLOY DONE ====='
          "
