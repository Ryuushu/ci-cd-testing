name: Deploy via Cloudflare SSH Tunnel

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client wget

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: SSH via tunnel
        run: |
          cloudflared access ssh --hostname ssh.nixie.my.id --command "whoami && hostname"

      - name: Test connection
        run: |
          ssh -o StrictHostKeyChecking=no nixie "whoami && hostname"

      - name: Deploy application
        run: |
          ssh nixie "
            set -e

            echo '== DEPLOY START =='

            cd /home/nixie || exit 1

            echo '== DEPLOY DONE =='
          "
