name: Deploy via NetBird

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted   # penting jika runner di NetBird

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install NetBird
        run: |
          curl -fsSL https://pkgs.netbird.io/install.sh | sudo bash
          sudo netbird up --setup-key ${{ secrets.NETBIRD_KEY }}
      - name: SSH Deploy
        run: |
          ssh root@debian-production.netbird.cloud "ls"
